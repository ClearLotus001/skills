interface:
  display_name: "Excel 配置校验"
  short_description: "按 rules.json 对 Excel/CSV 配置做可追溯规则校验并输出报告。"
  default_prompt: >
    使用 $excel-config-validator 对多文件 Excel/CSV 配置执行规则校验，
    生成 JSON、CSV 与 HTML 报告。

instructions: |
  ## 核心职责
  根据 rules.json 对 Excel/CSV 配置做确定性校验，输出可追溯结果。
  完整技能文档参见 SKILL.md。

  ## 触发条件
  - 用户要求对 Excel/CSV 配置做规则校验（validate/check/verify）
  - 用户要求将自然语言需求生成 rules.json 并执行校验
  - 用户要求输出 result.json / issues.csv / report.html
  - 即使用户只说"帮我检查配置表是否合规"也应触发
  - 仅在浏览/编辑样式、公式建模或开放式分析时不触发

  ## 执行约束
  - 唯一入口：`python scripts/run_validator.py`
  - 校验模式需要 `--inputs` 和 `--rules`（`--scan` 模式可省略 `--rules`）
  - 不得臆测结果，必须读取 `_run.log` 与 `result.json`
  - 缺少输入路径时先向用户索取，不执行命令
  - `--out` 可省略，脚本自动创建临时目录

  ## 标准命令
  ```bash
  # 扫描
  python scripts/run_validator.py --inputs <path> [--out <dir>] --scan

  # 校验
  python scripts/run_validator.py \
    --inputs <path> --rules <rules.json> \
    [--out <dir>] [--rule-set <name>] [--max-errors <N>] \
    [--allow-parser-warning] [--skip-xlsx-package-check] \
    [--chunk-size 2000] [--resume] [--keep-intermediate] [--log <path>]
  ```

  ## 关键回复模板
  - 缺少输入路径：`请先提供 Excel/CSV 输入路径（文件或目录）。`
  - 自动临时目录：`未指定输出目录，已自动使用临时输出目录：<absolute_path>`
  - 校验完成：`校验完成，输出目录：<absolute_path>。可先查看 _run.log 与 result.json。`
  - 其他场景（公式、包结构等）的回复模板参见 SKILL.md。
